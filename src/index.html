<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote Generator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <h1>Quote <span>Generator</span></h1>
          <p>Powered by AI &mdash; type any topic, get an inspiring quote.</p>
        </div>
        <div class="logo-mark">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M6.5 10c-.223 0-.437.034-.65.065.069-.232.14-.468.254-.68.114-.308.292-.575.469-.844.148-.291.409-.488.601-.737.201-.242.475-.403.692-.604.213-.21.492-.315.714-.463.232-.133.434-.28.65-.35.208-.086.39-.16.539-.222.302-.125.474-.197.474-.197L9.758 4.03c0 0-.218.052-.597.144C8.97 4.222 8.737 4.278 8.472 4.375c-.271.05-.56.187-.882.312C7.309 4.799 6.987 4.951 6.596 5.187 6.216 5.407 5.822 5.714 5.454 6.099c-.374.378-.693.851-.972 1.341-.269.476-.538 1.017-.687 1.618-.143.57-.226 1.22-.226 1.862 0 1.655.675 3.155 1.746 4.214.538.51 1.189.91 1.906 1.167.707.247 1.464.345 2.207.207.741-.138 1.377-.49 1.875-.994.501-.508.813-1.176.941-1.908.13-.728.069-1.454-.13-2.095C12.2 11.127 11.693 10.5 11.02 10.08A4.01 4.01 0 0 0 8.99 10h-2.49zm11 0c-.223 0-.437.034-.65.065.069-.232.14-.468.254-.68.114-.308.292-.575.469-.844.148-.291.409-.488.601-.737.201-.242.475-.403.692-.604.213-.21.492-.315.714-.463.232-.133.434-.28.65-.35.208-.086.39-.16.539-.222.302-.125.474-.197.474-.197l.138-1.993c0 0-.218.052-.597.144-.191.048-.424.104-.689.201-.271.05-.56.187-.882.312-.282.112-.604.264-.995.5-.38.22-.774.527-1.142.912-.374.378-.693.851-.972 1.341-.269.476-.538 1.017-.687 1.618-.143.57-.226 1.22-.226 1.862 0 1.655.675 3.155 1.746 4.214.538.51 1.189.91 1.906 1.167.707.247 1.464.345 2.207.207.741-.138 1.377-.49 1.875-.994.501-.508.813-1.176.941-1.908.13-.728.069-1.454-.13-2.095-.273-.72-.78-1.347-1.453-1.767A4.01 4.01 0 0 0 19.99 10h-2.49z"
            />
          </svg>
        </div>
      </header>

      <!-- Input -->
      <div class="input-card">
        <div class="input-row">
          <div class="input-wrap">
            <input
              type="text"
              id="topicInput"
              placeholder="Enter the topic of your quote?"
              maxlength="80"
            />
          </div>
          <button
            class="btn-generate"
            id="generateBtn"
            onclick="generateQuote()"
          >
            Generate Quote
          </button>
        </div>
        <p class="input-hint">e.g. Courage, Ocean, Success, Solitude</p>
        <p class="error-msg" id="errorMsg">Please enter a topic first.</p>
      </div>

      <!-- Output -->
      <div class="output-card" id="outputCard">
        <span class="quote-mark">"</span>
        <p class="quote-text" id="quoteText"></p>
        <p class="quote-source" id="quoteSource">AI Quote Generator</p>
        <div class="output-actions">
          <button class="btn-secondary" onclick="copyQuote()">📋 Copy</button>
          <button class="btn-secondary" onclick="generateQuote()">
            ↺ Regenerate
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
